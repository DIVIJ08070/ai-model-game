<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0c1022" />
<meta name="description" content="A collection of webcam & motion-controlled browser games. Play with your body — no controller needed." />
<title>Motion Arcade — play with your body</title>
<style>
  :root{
    --bg:#0c1022; --bg2:#0a0e1c; --panel:#141a33; --ink:#eaf0ff; --muted:#9aa6d0;
    --cyan:#5ee0ff; --pink:#ff5da2; --green:#3ef0a0; --yellow:#ffd23f;
    --purple:#7c5cff; --orange:#ff8a3c;
    --line:rgba(255,255,255,0.10);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; min-height:100%; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Trebuchet MS','Segoe UI',system-ui,-apple-system,sans-serif;
    overflow-x:hidden; position:relative; min-height:100vh;
  }

  /* ---------- animated synthwave background ---------- */
  .bg{ position:fixed; inset:0; z-index:-1; overflow:hidden; background:
      radial-gradient(120% 80% at 50% -10%, #1b2350 0%, var(--bg) 55%, var(--bg2) 100%); }
  .sun{
    position:absolute; left:50%; top:8vh; width:min(60vw,420px); aspect-ratio:1;
    transform:translateX(-50%); border-radius:50%;
    background:radial-gradient(circle at 50% 45%, #ffd76a 0%, #ff7ad0 45%, #a24bff 70%, transparent 72%);
    filter:blur(6px); opacity:.55;
  }
  .grid{
    position:absolute; left:50%; bottom:-10vh; width:300vw; height:60vh;
    transform:translateX(-50%) perspective(340px) rotateX(66deg);
    background-image:
      linear-gradient(var(--cyan) 2px, transparent 2px),
      linear-gradient(90deg, var(--cyan) 2px, transparent 2px);
    background-size:60px 60px; opacity:.22;
    -webkit-mask-image:linear-gradient(to top, #000 20%, transparent 90%);
            mask-image:linear-gradient(to top, #000 20%, transparent 90%);
    animation:flow 3.5s linear infinite;
  }
  @keyframes flow{ to{ background-position:0 60px, 0 0; } }
  @media (prefers-reduced-motion:reduce){ .grid{ animation:none; } }

  /* ---------- layout ---------- */
  .wrap{ max-width:1080px; margin:0 auto; padding:clamp(20px,5vw,56px) 20px 80px; }

  header.hero{ text-align:center; margin-bottom:clamp(28px,6vw,56px); }
  .kicker{
    display:inline-block; font-size:11px; letter-spacing:3px; text-transform:uppercase;
    font-weight:800; color:var(--cyan); border:1px solid var(--line);
    padding:6px 14px; border-radius:999px; background:rgba(94,224,255,.06);
  }
  h1{
    font-size:clamp(38px,9vw,84px); line-height:.95; margin:18px 0 10px; font-weight:900;
    letter-spacing:1px;
    background:linear-gradient(90deg,var(--cyan),var(--pink) 60%,var(--purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(124,92,255,.25);
  }
  .sub{ color:var(--muted); font-size:clamp(15px,3.4vw,19px); max-width:560px; margin:0 auto; }
  .count{ margin-top:16px; font-size:13px; color:var(--muted); }
  .count b{ color:var(--yellow); }

  /* ---------- game grid ---------- */
  .games{ display:grid; gap:20px; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); }

  .card{
    position:relative; display:flex; flex-direction:column; text-decoration:none; color:inherit;
    background:linear-gradient(180deg,var(--panel),#10152a);
    border:1px solid var(--line); border-radius:20px; padding:22px; min-height:230px;
    overflow:hidden; transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .card::before{ /* accent glow */
    content:""; position:absolute; inset:-1px; border-radius:20px; padding:1px; pointer-events:none;
    background:linear-gradient(140deg, var(--accent,var(--cyan)), transparent 45%);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude; opacity:.5; transition:opacity .18s ease;
  }
  a.card:hover, a.card:focus-visible{
    transform:translateY(-4px); border-color:transparent; outline:none;
    box-shadow:0 18px 50px -12px color-mix(in srgb, var(--accent,var(--cyan)) 55%, transparent);
  }
  a.card:hover::before, a.card:focus-visible::before{ opacity:1; }

  .thumb{
    width:64px; height:64px; border-radius:16px; display:grid; place-items:center;
    font-size:34px; margin-bottom:16px;
    background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--accent,var(--cyan)) 35%, transparent), rgba(0,0,0,.2));
    border:1px solid var(--line);
  }
  .card h2{ font-size:22px; margin:0 0 6px; font-weight:900; }
  .tags{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .tag{
    font-size:10px; letter-spacing:1px; text-transform:uppercase; font-weight:800;
    color:var(--accent,var(--cyan)); border:1px solid var(--line); padding:3px 8px; border-radius:999px;
    background:rgba(255,255,255,.03);
  }
  .card p{ color:var(--muted); font-size:14px; line-height:1.5; margin:0 0 18px; }
  .play{
    margin-top:auto; align-self:flex-start; font-weight:900; font-size:14px; letter-spacing:.5px;
    padding:10px 18px; border-radius:12px; color:#0c1022;
    background:linear-gradient(90deg,var(--accent,var(--cyan)),#fff 220%);
  }

  .badge{
    position:absolute; top:16px; right:16px; font-size:10px; font-weight:900; letter-spacing:1.5px;
    padding:5px 10px; border-radius:999px; color:#0c1022; background:var(--green);
    box-shadow:0 0 20px color-mix(in srgb,var(--green) 60%, transparent);
  }

  /* coming-soon ghost card */
  .card.soon{ border-style:dashed; opacity:.6; cursor:default; }
  .card.soon .thumb{ filter:grayscale(1); opacity:.7; }
  .card.soon .play{ background:var(--line); color:var(--muted); }

  footer{ text-align:center; color:var(--muted); font-size:13px; margin-top:56px; }
  footer a{ color:var(--cyan); text-decoration:none; }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"><div class="sun"></div><div class="grid"></div></div>

  <div class="wrap">
    <header class="hero">
      <span class="kicker">Webcam · Motion · No controller</span>
      <h1>MOTION ARCADE</h1>
      <p class="sub">Browser games you play with your body. Stand up, turn on your camera, and move.</p>
      <p class="count"><b id="playable">0</b> games playable · more on the way</p>
    </header>

    <main class="games" id="games"></main>

    <footer>
      Built by <a href="https://github.com/DIVIJ08070" target="_blank" rel="noopener">DIVIJ08070</a> ·
      more games dropping soon 🎮
    </footer>
  </div>

<script>
  /* ============================================================
     ADD A NEW GAME:  copy one block below, change the fields,
     drop your game's .html file in this folder, and set `href`.
     Set soon:true for a "coming soon" placeholder (no link).
     ============================================================ */
  const GAMES = [
    {
      title: "Body Dash 3D",
      emoji: "🏃",
      href:  "game3d.html",
      accent:"#7c5cff",
      badge: "NEW",
      tags:  ["3D", "Endless Runner", "Full-body"],
      desc:  "A 3D endless runner controlled by your whole body. Jump, duck, and switch lanes with real movement."
    },
    {
      title: "Body Dash · Classic 2D",
      emoji: "🕹️",
      href:  "body-dash-2d.html",
      accent:"#5ee0ff",
      tags:  ["2D", "Endless Runner", "Webcam"],
      desc:  "The original camera-motion runner. Lean to change lanes, jump to leap, duck to slide — with a live leaderboard."
    },
    {
      title: "Your next game",
      emoji: "✨",
      soon:  true,
      accent:"#ff5da2",
      tags:  ["Coming soon"],
      desc:  "This slot is waiting. Build it, drop the file in, add one entry here, and it's live."
    }
  ];

  const el = document.getElementById('games');
  let playable = 0;
  for (const g of GAMES){
    const soon = !!g.soon;
    if (!soon) playable++;
    const card = document.createElement(soon ? 'div' : 'a');
    card.className = 'card' + (soon ? ' soon' : '');
    if (!soon){ card.href = g.href; }
    card.style.setProperty('--accent', g.accent || '#5ee0ff');
    card.innerHTML = `
      ${g.badge ? `<span class="badge">${g.badge}</span>` : ''}
      <div class="thumb">${g.emoji || '🎮'}</div>
      <h2>${g.title}</h2>
      <div class="tags">${(g.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <p>${g.desc || ''}</p>
      <span class="play">${soon ? 'Coming soon' : 'Play ▸'}</span>`;
    el.appendChild(card);
  }
  document.getElementById('playable').textContent = playable;
</script>
</body>
</html>
